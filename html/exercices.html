<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Step by Step — Entraînement corrigé</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style_exercices.css"/>
    

</head>
<body>

<header>
    <div class="logo">Step <em>by</em> Step</div>
    <span class="page-badge">Entraînement corrigé</span>
    <div class="header-nav"><a href="../index.html">← Accueil</a></div>
</header>

<div class="intro">
    <h2>Exercices avec corrigé</h2>
    <p>Cliquez sur un texte pour ouvrir l'espace de travail. Vous pourrez consulter le corrigé colonne par colonne.</p>
</div>

<!--
════════════════════════════════════════════════════════
  NOTE ENSEIGNANT — comment ajouter un exercice
  ─────────────────────────────────────────────────────
  1. Dans espace_enseignant.html :
       • Remplissez Titre, Auteur et Nom du fichier export
       • Préparez le texte, annotez, remplissez le juxtalatin et la traduction
       • Cliquez "Exporter le texte"
  2. Déposez le fichier téléchargé dans :
         html/textes/VOTREFICHIER.html
  3. Copiez un bloc .ex-card ci-dessous et renseignez :
       • data-fichier   = nom du fichier SANS .html
       • .ex-avatar     = initiale de l'auteur
       • .ex-author     = nom de l'auteur
       • .ex-title      = titre du texte
       • .ex-level      = level-1 / level-2 / level-3
════════════════════════════════════════════════════════
-->

<div class="exercises-grid" id="exercises-grid">

    <!-- ══ EXERCICE 1 ══════════════════════════════════════
         data-fichier = nom du fichier dans html/textes/
    ═══════════════════════════════════════════════════ -->
    <div class="ex-card"
         data-fichier="tacite_germanie_001"
         onclick="openExercise(this)">
        <div class="ex-card-body">
            <div class="ex-avatar">T</div>
            <div class="ex-author">Tacite</div>
            <div class="ex-title">Germanie, 1</div>
        </div>
        <div class="ex-card-footer">
            <span class="ex-level level-1">Débutant</span>
            <span class="ex-open">Ouvrir <svg viewBox="0 0 12 12"><polyline points="4 2 10 6 4 10"/></svg></span>
        </div>
    </div>

    <!-- Carte placeholder -->
    <div class="ex-card-empty">
        <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="12"/><line x1="16" y1="10" x2="16" y2="22"/><line x1="10" y1="16" x2="22" y2="16"/></svg>
        Prochain exercice<br>à venir…
    </div>

</div>

<footer>
    Step by Step — <a href="../index.html">Accueil</a>
</footer>

<script>
/*
  openExercise(card)
  ──────────────────────────────────────────────────────────
  Les fichiers étudiants (exports de espace_enseignant.html)
  doivent être placés dans : html/textes/FICHIER.html

  Structure du dépôt GitHub :
    stepbystep/
    ├── index.html
    └── html/
        ├── bac_a_sable.html
        ├── espace_enseignant.html
        ├── exercices.html
        └── textes/
            ├── cesar_gaules_06_17.html
            └── ...
*/
function openExercise(card) {
    var fichier = card.dataset.fichier;
    if (!fichier) return;

    // Construit l'URL robuste depuis n'importe quel contexte
    // (local, GitHub Pages sous-répertoire, domaine racine)
    var path = window.location.pathname;
    // Retire le nom du fichier courant pour obtenir le dossier html/
    var base = path.substring(0, path.lastIndexOf('/'));
    var url  = base + '/textes/' + fichier + '.html';
    window.open(url, '_blank');
}
</script>
</body>
</html>
